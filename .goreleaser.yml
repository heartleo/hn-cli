version: 2

project_name: hn

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: hn
    main: ./cmd/hn
    binary: hn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/heartleo/hn-cli.Version={{.Version}} -X github.com/heartleo/hn-cli.Commit={{.Commit}} -X github.com/heartleo/hn-cli.Date={{.Date}}

archives:
  - id: hn
    ids:
      - hn
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Bug Fixes
      regexp: '^fix:'
    - title: Features
      regexp: '^feat:'
    - title: Documentation
      regexp: '^docs:'
    - title: Other
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^ci:'
      - '^style:'
      - '^Merge '

brews:
  - name: hn
    ids:
      - hn
    repository:
      owner: heartleo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/heartleo/hn-cli"
    description: "A terminal-based Hacker News client"
    license: "MIT"
    install: |
      bin.install "hn"
    test: |
      system "#{bin}/hn", "--version"

winget:
  - name: hn
    package_identifier: heartleo.hn
    publisher: heartleo
    publisher_url: "https://github.com/heartleo"
    homepage: "https://github.com/heartleo/hn-cli"
    short_description: "A terminal-based Hacker News client"
    license: MIT
    tags:
      - hacker-news
      - terminal
      - tui
      - cli
    repository:
      owner: heartleo
      name: winget-pkgs
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  draft: true
  replace_existing_draft: true
